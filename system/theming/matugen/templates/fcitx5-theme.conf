[Metadata]
Name=Matugen
Version=1.0
Author=Matugen Generator
Description=Dynamic Material You theme for fcitx5

[InputPanel]
Font=Sans 12
BackgroundColor={{colors.background.default.hex}}
BorderColor={{colors.outline.default.hex}}
BorderColorWidth=1

[InputPanel/Text]
Color={{colors.on_surface.default.hex}}

[InputPanel/Highlight]
Color={{colors.primary.default.hex}}
BackgroundColor={{colors.primary_container.default.hex}}

[InputPanel/Highlight/Text]
Color={{colors.on_primary_container.default.hex}}

[InputPanel/Preedit]
Color={{colors.on_surface.default.hex}}

[InputPanel/Preedit/Cursor]
Color={{colors.primary.default.hex}}

[Menu]
BackgroundColor={{colors.background.default.hex}}
BorderColor={{colors.outline.default.hex}}

[Menu/Item]
Color={{colors.on_surface.default.hex}}
BackgroundColor={{colors.surface_container.default.hex}}

[Menu/Item/Highlight]
Color={{colors.on_primary.default.hex}}
BackgroundColor={{colors.primary.default.hex}}

[Menu/Separator]
Color={{colors.outline_variant.default.hex}}

[Menu/ScrollBar]
BackgroundColor={{colors.surface_container_high.default.hex}}
ForegroundColor={{colors.primary.default.hex}}